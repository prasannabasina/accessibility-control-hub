<!DOCTYPE html>
<html>
<head>
  <title>Smart Health Tracker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f4f8;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 50px;
    }
    h2 {
      color: #333;
      margin-bottom: 20px;
    }
    .input-box {
      margin: 10px 0;
    }
    input {
      padding: 10px;
      width: 200px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    button {
      padding: 10px 20px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 15px;
    }
    button:hover {
      background: #0056b3;
    }
    #result-box {
      margin-top: 30px;
      padding: 20px;
      width: 300px;
      text-align: center;
      border-radius: 10px;
      background: #ffffff;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    #risk {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 10px;
    }
    #recommendation {
      font-size: 16px;
      color: #555;
    }
  </style>
</head>
<body>

<h2>Smart Health Tracker</h2>

<div class="input-box">
  <input id="age" placeholder="Age" type="number">
</div>
<div class="input-box">
  <input id="hr" placeholder="Heart Rate" type="number">
</div>
<div class="input-box">
  <input id="sys" placeholder="BP Systolic" type="number">
</div>
<div class="input-box">
  <input id="dia" placeholder="BP Diastolic" type="number">
</div>

<button onclick="predict()">Check Risk</button>

<div id="result-box" style="display:none;">
  <div id="risk"></div>
  <div id="recommendation"></div>
</div>

<script>
function predict() {
  fetch("/predict", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      age: Number(document.getElementById("age").value),
      heartRate: Number(document.getElementById("hr").value),
      bpSystolic: Number(document.getElementById("sys").value),
      bpDiastolic: Number(document.getElementById("dia").value)
    })
  })
  .then(res => res.json())
  .then(data => {
    document.getElementById("result-box").style.display = "block";
    document.getElementById("risk").innerText = "Risk: " + data.risk;
    
    // Recommendation
    let rec = data.risk === "High" ? 
      "Consult doctor, reduce salt, exercise daily" : 
      "You are healthy, maintain your lifestyle";
    document.getElementById("recommendation").innerText = rec;
  })
  .catch(err => {
    document.getElementById("result-box").style.display = "block";
    document.getElementById("risk").innerText = "Error";
    document.getElementById("recommendation").innerText = "Something went wrong!";
    console.error(err);
  });
}
</script>

</body>
</html>
